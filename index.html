<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Coiff - Réservation</title>
<style>
body { font-family: Arial; background:#f3f3f3; margin:0; }
header { background:#000; color:#fff; text-align:center; padding:20px; font-weight:bold;}
.container { max-width:400px; margin:20px auto; background:#fff; padding:20px; border-radius:20px; position:relative; }

/* Logo en haut */
.logo {
    display:block;
    margin:0 auto 15px;
    width:140px;
    height:auto;
}

input, select, button { width:100%; padding:10px; margin:5px 0; border-radius:10px; border:1px solid #ccc; }
button.submit { background:#000; color:#fff; border:none; cursor:pointer; }

.buttons { display:flex; gap:10px; flex-wrap:wrap; margin:5px 0; }
.option {
    padding:8px 12px;
    border-radius:20px;
    border:none;
    background:#fff; /* blanc initial */
    color:#000;       /* texte noir initial */
    cursor:pointer;
}
.option.active { background:#000; color:#fff; } /* noir + texte blanc après sélection */

.calendar-header { display:flex; justify-content:space-between; align-items:center; margin:10px 0; }
.calendar-header button { padding:5px 10px; font-size:0.9em; background:#ccc; border:none; cursor:pointer; color:#000; border-radius:5px; }

.calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.day { padding:10px; text-align:center; border-radius:50%; cursor:pointer; }
.day.selected { background:#000; color:#fff; }
.day.blocked { background:#ccc; cursor:not-allowed; }
</style>
</head>
<body>

<header>Space Coiff - Réservez Votre Créneau</header>

<div class="container">

<!-- Logo en haut -->
<img src="logo_space_coiff.png" class="logo">

<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prénom">
<input id="email" placeholder="Email">
<input id="tel" placeholder="Téléphone">

<b>Services</b>
<div class="buttons">
<button class="option">Coiffure</button>
<button class="option">Coloration</button>
<button class="option">Soins</button>
</div>

<div class="calendar-header">
<button onclick="prevMonth()">◀️</button>
<strong id="monthLabel"></strong>
<button onclick="nextMonth()">▶️</button>
</div>
<div id="calendar" class="calendar-grid"></div>

<select id="heure">
<option>09:00</option><option>10:00</option><option>11:00</option>
<option>12:00</option><option>14:00</option><option>16:00</option>
<option>18:00</option>
</select>

<button class="submit" onclick="reserver()">Réserver</button>
<a id="waLink" style="display:none;" target="_blank"></a>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyABAx8rHzrQDCx-DLjW0aVJsh1iA_SBadY",
  authDomain: "space-coiff.firebaseapp.com",
  projectId: "space-coiff"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Services
document.querySelectorAll(".option").forEach(btn=>{
    btn.onclick=()=> btn.classList.toggle("active");
});

// Calendrier
let currentDate = new Date();
let selectedDate = null;
let blockedDates = [];
let blockedHours = [];
const months = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

async function loadBlockedDates(){
    blockedDates=[];
    const res = await getDocs(collection(db,"reservations"));
    res.forEach(doc=>{
        const data = doc.data();
        if(data.date) blockedDates.push(data.date);
    });
}

async function updateHeuresBloquees(){
    blockedHours = [];
    if(!selectedDate) return;
    const res = await getDocs(collection(db,"reservations"));
    res.forEach(doc=>{
        const data = doc.data();
        if(data.date === selectedDate) blockedHours.push(data.heure);
    });
    const heureSelect = document.getElementById("heure");
    for(let i=0;i<heureSelect.options.length;i++){
        const option = heureSelect.options[i];
        if(blockedHours.includes(option.value)){
            option.disabled=true;
            option.style.color="#ccc";
        } else {
            option.disabled=false;
            option.style.color="#000";
        }
    }
}

function renderCalendar(){
    const cal=document.getElementById("calendar");
    const label=document.getElementById("monthLabel");
    cal.innerHTML="";
    const y=currentDate.getFullYear();
    const m=currentDate.getMonth();
    label.innerText=months[m]+" "+y;
    const first=new Date(y,m,1).getDay();
    const days=new Date(y,m+1,0).getDate();
    const start=first===0?6:first-1;
    for(let i=0;i<start;i++) cal.innerHTML+="<div></div>";
    for(let d=1; d<=days; d++){
        const el=document.createElement("div");
        el.className="day";
        el.innerText=d;
        const full=`${d}/${m+1}/${y}`;
        el.onclick=()=>{
            document.querySelectorAll(".day").forEach(e=>e.classList.remove("selected"));
            el.classList.add("selected");
            selectedDate=full;
            updateHeuresBloquees();
        };
        cal.appendChild(el);
    }
}

window.nextMonth=()=>{ currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); };
window.prevMonth=()=>{ currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); };

await loadBlockedDates();
renderCalendar();

// Réservation
window.reserver = async function(){
    const nom=document.getElementById("nom").value;
    const prenom=document.getElementById("prenom").value;
    const email=document.getElementById("email").value;
    const tel=document.getElementById("tel").value;
    const heure=document.getElementById("heure").value;
    const services=[...document.querySelectorAll(".option.active")].map(e=>e.innerText).join(", ")||"Non précisé";

    if(!nom || !prenom || !tel || !selectedDate){
        alert("Remplis tous les champs !");
        return;
    }

    const phone="212661137243";
    const message=`Nouvelle réservation Space Coiff :
Nom: ${nom} ${prenom}
Tel: ${tel}
Service: ${services}
Date: ${selectedDate}
Heure: ${heure}`;

    // WhatsApp
    const waLink=document.getElementById("waLink");
    waLink.href=`https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(message)}`;
    waLink.click();

    // Firebase
    await addDoc(collection(db,"reservations"),{
        nom,prenom,email,tel,services,date:selectedDate,heure,createdAt:new Date()
    });

    // Reset
    document.getElementById("nom").value="";
    document.getElementById("prenom").value="";
    document.getElementById("email").value="";
    document.getElementById("tel").value="";
    document.getElementById("heure").selectedIndex=0;
    document.querySelectorAll(".option.active").forEach(e=>e.classList.remove("active"));
    document.querySelectorAll(".day.selected").forEach(e=>e.classList.remove("selected"));
    selectedDate=null;

    await loadBlockedDates();
    renderCalendar();
};
</script>
</body>
</html>
